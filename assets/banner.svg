<svg xmlns="http://www.w3.org/2000/svg" width="900" height="350" viewBox="0 0 900 350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&amp;family=Cinzel+Decorative:wght@700&amp;display=swap');

      .name {
        font-family: 'Cinzel Decorative', serif;
        font-size: 56px;
        font-weight: 700;
        letter-spacing: 6px;
        fill: url(#shimmer-gradient);
        text-anchor: middle;
      }

      .label {
        font-family: 'Cinzel', serif;
        font-size: 12px;
        letter-spacing: 8px;
        fill: rgba(255, 255, 255, 0.4);
        text-anchor: middle;
        text-transform: uppercase;
      }

      .kanji {
        font-size: 72px;
        fill: rgba(255, 255, 255, 0.05);
        font-family: serif;
      }

      .hr {
        stroke: rgba(255, 255, 255, 0.2);
        stroke-width: 1;
      }

      @keyframes shimmer {
        0% { stop-offset: -100%; }
        100% { stop-offset: 200%; }
      }

      @keyframes sweep {
        0% { transform: translateX(-100%); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateX(100%); opacity: 0; }
      }

      .sweep-rect {
        animation: sweep 8s ease-in-out infinite;
      }
      
      .shimmer-stop {
        animation: shimmer 4s linear infinite;
      }
    </style>

    <linearGradient id="shimmer-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1">
        <animate attributeName="offset" values="-1; 2" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.8" />
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="20%" stop-color="transparent" />
      <stop offset="80%" stop-color="rgba(0,0,0,0.6)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.95)" />
    </radialGradient>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05" />
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background Image (Base64 or relative path) -->
  <!-- Note: Relative paths in SVGs work if served from the same repo -->
  <image href="eyeofdeath.jpg" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" />

  <!-- Vignette Layer -->
  <rect width="100%" height="100%" fill="url(#vignette)" />

  <!-- Noise/Grain Layer -->
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.5" pointer-events="none" />

  <!-- Sweep Animation Layer -->
  <rect width="200" height="100%" fill="rgba(255,255,255,0.02)" class="sweep-rect" filter="blur(40px)" transform="rotate(15)" />

  <!-- Kanji Decorations -->
  <text x="40" y="190" class="kanji">死</text>
  <text x="800" y="190" class="kanji">生</text>

  <!-- Center Content -->
  <g transform="translate(450, 175)">
    <!-- Top Label -->
    <text y="-80" class="label">PORTFOLIO SHOWCASE</text>
    
    <!-- Top HR -->
    <line x1="-150" y1="-60" x2="150" y2="-60" class="hr" />
    
    <!-- Main Name -->
    <text y="15" class="name">WHITE D CODER</text>
    
    <!-- Bottom HR -->
    <line x1="-150" y1="40" x2="150" y2="40" class="hr" />
    
    <!-- Bottom Label -->
    <text y="70" class="label">AGENTIC AI • FULL STACK • AUTOMATION</text>
  </g>

  <!-- Decorative Corners -->
  <path d="M 20 20 L 50 20 M 20 20 L 20 50" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  <path d="M 880 20 L 850 20 M 880 20 L 880 50" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  <path d="M 20 330 L 50 330 M 20 330 L 20 300" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  <path d="M 880 330 L 850 330 M 880 330 L 880 300" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
</svg>
